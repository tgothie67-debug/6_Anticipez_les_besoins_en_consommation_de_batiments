service: "service:BuildingPredictionService"

include:
  - "service.py"
  - "train_and_save.py"
  - "data/*.csv"

models:
  - "energy_rf_model:latest"
  - "ghg_rf_model:latest"

python:
  packages:
    - bentoml
    - scikit-learn
    - pandas
    - numpy
    - pydantic
    - openpyxl

docker:
  python_version: "3.11"